<script>
'use strict';
const input = document.getElementById('input');
const output = document.getElementById('output');
const inputStatus = document.getElementById('input-status');
const outputStatus = document.getElementById('output-status');
const inputStats = document.getElementById('input-stats');
const outputStats = document.getElementById('output-stats');

// Live validation on input
let validateTimer;
input.addEventListener('input', () => {
  clearTimeout(validateTimer);
  validateTimer = setTimeout(autoValidate, 500);
});

function autoValidate() {
  const val = input.value.trim();
  if (!val) {
    inputStatus.innerHTML = '';
    inputStats.innerHTML = '';
    return;
  }
  try {
    JSON.parse(val);
    inputStatus.innerHTML = '<span class="status status-ok">✓ 有效 JSON</span>';
    const obj = JSON.parse(val);
    const size = new Blob([val]).size;
    const keys = countKeys(obj);
    inputStats.innerHTML = `<span>大小: ${formatSize(size)}</span><span>键数: ${keys}</span>`;
  } catch(e) {
    inputStatus.innerHTML = `<span class="status status-err">⚠ ${e.message}</span>`;
    inputStats.innerHTML = '';
  }
}

function countKeys(obj) {
  if (typeof obj !== 'object' || obj === null) return 0;
  if (Array.isArray(obj)) return obj.reduce((s, i) => s + countKeys(i), 0);
  return Object.keys(obj).length + Object.values(obj).reduce((s, v) => s + countKeys(v), 0);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function getJSON() {
  try { return JSON.parse(input.value.trim()); }
  catch(e) { throw new Error('无效的 JSON: ' + e.message); }
}

function setOutput(text, type = 'text') {
  output.textContent = text;
  const size = new Blob([text]).size;
  outputStats.innerHTML = `<span>大小: ${formatSize(size)}</span>`;
  outputStatus.innerHTML = '<span class="status status-ok">✓ 完成</span>';
}

function setError(msg) {
  output.textContent = '❌ ' + msg;
  outputStatus.innerHTML = '<span class="status status-err">⚠ Error</span>';
  outputStats.innerHTML = '';
}

function formatJSON() {
  try {
    const obj = getJSON();
    setOutput(JSON.stringify(obj, null, 2));
  } catch(e) { setError(e.message); }
}

function minifyJSON() {
  try {
    const obj = getJSON();
    setOutput(JSON.stringify(obj));
  } catch(e) { setError(e.message); }
}

function validateJSON() {
  try {
    const obj = getJSON();
    const size = new Blob([input.value]).size;
    const keys = countKeys(obj);
    setOutput(`✅ 有效的 JSON\n\n类型: ${Array.isArray(obj) ? 'Array' : typeof obj === 'object' ? 'Object' : typeof obj}\n大小: ${formatSize(size)}\n键数: ${keys}\n\n结构Preview:\n${JSON.stringify(obj, null, 2).substring(0, 2000)}`);
  } catch(e) { setError(e.message); }
}

function escapeJSON() {
  if (!input.value.trim()) return setError('请先Input内容');
  setOutput(JSON.stringify(input.value));
}

function unescapeJSON() {
  try {
    const val = input.value.trim();
    const parsed = JSON.parse(val);
    setOutput(typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2));
  } catch(e) { setError('无法解析: ' + e.message); }
}

function sortKeys() {
  try {
    const obj = getJSON();
    const sorted = sortObject(obj);
    setOutput(JSON.stringify(sorted, null, 2));
  } catch(e) { setError(e.message); }
}

function sortObject(obj) {
  if (Array.isArray(obj)) return obj.map(sortObject);
  if (obj && typeof obj === 'object') {
    return Object.keys(obj).sort().reduce((acc, key) => {
      acc[key] = sortObject(obj[key]);
      return acc;
    }, {});
  }
  return obj;
}

function jsonToCSV() {
  try {
    const obj = getJSON();
    const arr = Array.isArray(obj) ? obj : [obj];
    if (!arr.length) return setError('数组为空');
    if (typeof arr[0] !== 'object') return setError('数组元素必须是对象');
    
    const keys = Object.keys(arr[0]);
    const csv = [
      keys.join(','),
      ...arr.map(row => keys.map(k => {
        const v = row[k];
        if (v === null || v === undefined) return '';
        const s = String(v);
        return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
      }).join(','))
    ].join('\n');
    setOutput(csv);
  } catch(e) { setError(e.message); }
}

function jsonToYAML() {
  try {
    const obj = getJSON();
    setOutput(toYAML(obj));
  } catch(e) { setError(e.message); }
}

function toYAML(obj, indent = 0) {
  const pad = '  '.repeat(indent);
  if (obj === null) return 'null';
  if (typeof obj === 'boolean') return obj.toString();
  if (typeof obj === 'number') return obj.toString();
  if (typeof obj === 'string') {
    if (obj.includes(':') || obj.includes('#') || obj.includes('\n')) return `"${obj.replace(/"/g,'\\"')}"`;
    return obj;
  }
  if (Array.isArray(obj)) {
    if (!obj.length) return '[]';
    return obj.map(item => `${pad}- ${toYAML(item, indent + 1).trimStart()}`).join('\n');
  }
  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (!keys.length) return '{}';
    return keys.map(k => `${pad}${k}: ${toYAML(obj[k], indent + 1).trimStart()}`).join('\n');
  }
  return String(obj);
}

function jsonToXML() {
  try {
    const obj = getJSON();
    setOutput('<?xml version="1.0" encoding="UTF-8"?>\n' + toXML(obj, 'root'));
  } catch(e) { setError(e.message); }
}

function toXML(obj, tag) {
  if (Array.isArray(obj)) {
    return obj.map((item, i) => toXML(item, tag.replace(/s$/, ''))).join('\n');
  }
  if (obj && typeof obj === 'object') {
    const children = Object.entries(obj).map(([k, v]) => toXML(v, k)).join('\n');
    return `<${tag}>\n${children.split('\n').map(l => '  ' + l).join('\n')}\n</${tag}>`;
  }
  const escaped = String(obj).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  return `<${tag}>${escaped}</${tag}>`;
}

function clearAll() {
  input.value = '';
  output.textContent = '等待Input...';
  inputStatus.innerHTML = '';
  outputStatus.innerHTML = '';
  inputStats.innerHTML = '';
  outputStats.innerHTML = '';
}

function copyOutput() {
  if (output.textContent === '等待Input...') return;
  navigator.clipboard.writeText(output.textContent).then(() => {
    outputStatus.innerHTML = '<span class="status status-ok">✓ 已Copy</span>';
    setTimeout(() => outputStatus.innerHTML = '<span class="status status-ok">✓ 完成</span>', 1500);
  });
}

function downloadOutput() {
  if (output.textContent === '等待Input...') return;
  const blob = new Blob([output.textContent], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'json-toolkit-output.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function swapPanels() {
  if (output.textContent === '等待Input...') return;
  input.value = output.textContent;
  output.textContent = '等待Input...';
  autoValidate();
  inputStatus.innerHTML = '';
  outputStatus.innerHTML = '';
  outputStats.innerHTML = '';
}

// Auto-format with Ctrl+Enter
input.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    formatJSON();
  }
});

// Load demo
input.value = '{"name":"JSON Toolkit","version":"1.0.0","author":{"name":"DevKit","url":"https://github.com"},"features":["format","validate","minify","csv","yaml","xml"],"stats":{"users":0,"rating":5},"active":true}';
autoValidate();
</script>
